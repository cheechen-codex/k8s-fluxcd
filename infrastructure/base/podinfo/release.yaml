apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: podinfo
  namespace: podinfo
spec:
  interval: 5m
  chart:
    spec:
      chart: podinfo
      version: 6.5.4  
      sourceRef:
        kind: HelmRepository
        name: podinfo
        namespace: podinfo
      interval: 1m
  values:
    replicaCount: 2
    service:
      type: ClusterIP
      port: 9898
