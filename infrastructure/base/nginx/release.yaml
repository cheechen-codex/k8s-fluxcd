# flux HelmRelease crd for installing nginx ingress controller helm chart
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nginx
  namespace: nginx
spec:
  releaseName: nginx
  targetNamespace: nginx
  interval: 1h # this is for drifting of the helm created resources
  chart:
    spec:
      chart: nginx-ingress
      version: 2.5.x # pin exact version for OCI
      interval: 5h  # this is for checking of a new chart
      sourceRef:
        kind: HelmRepository
        name: nginx
        namespace: nginx